name: Update registries

on:
  workflow_dispatch:
  schedule:
    # Daily at 06:00 UTC
    - cron: "0 6 * * *"

permissions:
  contents: write

concurrency:
  group: update-registries
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch registries and their indexes
        run: |
          curl -fsSL https://ui.shadcn.com/r/registries.json -o registries.json
          jq -c '.[]' registries.json | while read -r entry; do
            name=$(jq -r '.name' <<<"$entry")
            url=$(jq -r '.url' <<<"$entry")
            curl -fsSL "${url//\{name\}/registry}" -o "${name#@}.json" \
              && echo "ok $name" || echo "FAIL $name"
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update shadcn registries ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git push
          fi
